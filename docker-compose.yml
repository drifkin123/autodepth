services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: autodepth
      POSTGRES_PASSWORD: autodepth
      POSTGRES_DB: autodepth
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodepth"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
