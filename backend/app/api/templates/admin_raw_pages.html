<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoDepth Raw Page Review</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #252525;
      --text: #f5f5f5;
      --muted: #888;
      --accent: #e8d5a3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
    }
    header, main { max-width: 1440px; margin: 0 auto; padding: 18px 24px; }
    header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
    a { color: var(--accent); text-decoration: none; }
    button, input, select {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #1c1c1c;
      color: var(--text);
      padding: 8px 10px;
    }
    .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; background: var(--surface); }
    th, td { border-bottom: 1px solid var(--border); padding: 9px 10px; text-align: left; }
    th { color: var(--muted); font-size: 11px; text-transform: uppercase; }
    pre {
      max-height: 520px;
      overflow: auto;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      white-space: pre-wrap;
    }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <strong>AutoDepth Raw Page Review</strong>
    <a href="/api/admin">Ingestion Admin</a>
  </header>
  <main>
    <div class="filters">
      <select id="source"><option value="">All sources</option><option value="bring_a_trailer">BaT</option></select>
      <input id="targetType" placeholder="Target type">
      <input id="url" placeholder="URL contains">
      <button onclick="loadRawPages()">Refresh</button>
      <button onclick="enqueueMissingDetails()">Enqueue Missing Details</button>
    </div>
    <table>
      <thead>
        <tr><th>Fetched</th><th>Type</th><th>Status</th><th>Size</th><th>URL</th><th>Actions</th></tr>
      </thead>
      <tbody id="rows"><tr><td colspan="6" class="muted">Loading...</td></tr></tbody>
    </table>
    <h2>Content</h2>
    <pre id="content">Select a raw page.</pre>
    <h2>Preview</h2>
    <iframe id="preview" sandbox style="width:100%;height:420px;border:1px solid var(--border);background:white"></iframe>
  </main>
  <script>
    function esc(value) {
      return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function params() {
      const data = new URLSearchParams({ page: 1, page_size: 100 });
      for (const [name, id] of [['source', 'source'], ['target_type', 'targetType'], ['url', 'url']]) {
        const value = document.getElementById(id).value;
        if (value) data.set(name, value);
      }
      return data;
    }
    async function loadRawPages() {
      const response = await fetch(`/api/admin/raw-pages?${params()}`);
      if (!response.ok) return;
      const data = await response.json();
      document.getElementById('rows').innerHTML = data.items.map(page => `
        <tr>
          <td>${new Date(page.fetchedAt).toLocaleString()}</td>
          <td>${esc(page.targetType)}</td>
          <td>${page.statusCode ?? '-'}</td>
          <td>${page.sizeBytes}</td>
          <td><a href="${esc(page.url)}" target="_blank" rel="noopener">${esc(page.url)}</a></td>
          <td><button onclick="loadContent('${page.id}')">View</button>
          <button onclick="reparse('${page.id}')">Reparse</button></td>
        </tr>
      `).join('') || '<tr><td colspan="6" class="muted">No raw pages.</td></tr>';
    }
    async function loadContent(id) {
      const response = await fetch(`/api/admin/raw-pages/${id}/content`);
      const text = response.ok ? await response.text() : 'Failed to load content.';
      document.getElementById('content').textContent = text;
      document.getElementById('preview').srcdoc = text;
    }
    async function reparse(id) {
      await fetch(`/api/admin/raw-pages/${id}/reparse`, { method: 'POST' });
      await loadRawPages();
    }
    async function enqueueMissingDetails() {
      await fetch('/api/admin/raw-pages/enqueue-missing-details', { method: 'POST' });
      await loadRawPages();
    }
    window.addEventListener('DOMContentLoaded', loadRawPages);
  </script>
</body>
</html>
